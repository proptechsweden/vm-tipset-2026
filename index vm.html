function txt(id,k){var e=document.getElementById(id);if(e)e.innerHTML=S[L][k]}
function ptsTbl(d){var h='<h3 style="font-size:0.95rem;font-weight:600;margin:2rem 0 0.75rem;color:var(--cream-faint)">'+d[0][0]+'</h3><div class="points-grid"><div class="points-row header"><span class="cat">'+d[0][1]+'</span><span class="pts">'+d[0][2]+'</span></div>';for(var i=1;i<d.length;i++)h+='<div class="points-row"><span class="cat">'+d[i][0]+'</span><span class="pts">'+d[i][1]+'</span></div>';return h+'</div>'}
function render(){
var s=S[L];
txt("heroTag","heroTag");txt("heroTitle","heroTitle");txt("heroDesc","heroDesc");txt("heroCta","heroCta");txt("heroSec","heroSec");
document.getElementById("navHow").textContent=s.navHow;document.getElementById("navPts").textContent=s.navPts;document.getElementById("navGrp").textContent=s.navGrp;document.getElementById("navPrz").textContent=s.navPrz;
txt("statTeams","statTeams");txt("statMatches","statMatches");txt("statEntry","statEntry");txt("statPot","statPot");
txt("secHowLabel","secHowLabel");txt("secHowTitle","secHowTitle");txt("secHowDesc","secHowDesc");
txt("secPtsLabel","secPtsLabel");txt("secPtsTitle","secPtsTitle");txt("secPtsDesc","secPtsDesc");
txt("secGrpLabel","secGrpLabel");txt("secGrpTitle","secGrpTitle");txt("secGrpDesc","secGrpDesc");
txt("secPrzLabel","secPrzLabel");txt("secPrzTitle","secPrzTitle");txt("secPrzDesc","secPrzDesc");

var pb=document.getElementById("pointsBox");
pb.innerHTML=ptsTbl(s.ptsG)+ptsTbl(s.ptsK)+ptsTbl(s.ptsB)+'<p style="margin-top:1.5rem;font-size:0.85rem;color:var(--cream-faint);font-weight:300">'+s.ptsMax+'</p>';

G.forEach(function(g){var c=document.createElement("div");c.className="group-card"+(g.hl?" highlight":"");c.innerHTML='<div class="gh">Group '+g.id+(g.hl?" \u2014 "+s.grpSweden:"")+'</div>'+g.t.map(function(t){return'<div class="gt">'+t+'</div>'}).join("");gg.appendChild(c)});
var pz=document.getElementById("prizesBox");pz.innerHTML="";var ms=["var(--gold)","var(--silver)","var(--bronze)"];
s.prizes.forEach(function(p,i){pz.innerHTML+='<div class="prize'+(i===0?" first":"")+'"><div><span class="medal" style="background:'+ms[i]+'"></span><span class="place">'+p[0]+'</span></div><div class="amount">'+p[1]+(p[2]?'<small>'+p[2]+'</small>':'')+'</div></div>'});
document.getElementById("przExample").innerHTML=s.przEx;
var tl=document.getElementById("tlBox");tl.innerHTML="";
s.tl.forEach(function(t){tl.innerHTML+='<div class="tl-item'+(t[2]?" active":"")+'"><div class="tl-dot"></div><div><div class="tl-date">'+t[0]+'</div><div class="tl-text">'+t[1]+'</div></div></div>'});
var fq=document.getElementById("faqBox");fq.innerHTML="";
s.faq.forEach(function(f){fq.innerHTML+='<div class="faq-item"><div class="faq-q">'+f[0]+'</div><div class="faq-a">'+f[1]+'</div></div>'});
}
function setLang(l){
L=l;document.documentElement.lang=l;
document.getElementById("btnSv").classList.toggle("active",l==="sv");
document.getElementById("btnEn").classList.toggle("active",l==="en");
render();
}
setLang("sv");
var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target)}})},{threshold:0.15});
document.querySelectorAll(".reveal").forEach(function(el){obs.observe(el)});
</script>
</body>
</html>
